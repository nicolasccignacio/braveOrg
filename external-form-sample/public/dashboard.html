<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/material-theme.css" />
  </head>
  <body class="md-body">
    <header class="md-top-app-bar">
      <div class="md-top-app-bar__inner md-top-app-bar__inner--wide">
        <nav class="md-nav" aria-label="Site">
          <a href="index.html">Create expense</a>
          <a href="dashboard.html" aria-current="page">Dashboard</a>
          <a href="import-bank.html">Import bank</a>
        </nav>
      </div>
    </header>

    <main class="md-main md-container md-container--wide">
    <div class="page-head">
      <h1>Dashboard</h1>
      <button type="button" id="btnRefreshDashboard" class="md-btn md-btn--outlined">
        <span class="material-symbols-outlined" aria-hidden="true" style="font-size: 1.125rem">refresh</span>
        Refresh
      </button>
    </div>

    <p id="dashboardMeta" class="dashboard-meta" aria-live="polite"></p>
    <div class="dashboard-stats">
      <div class="stat-card">
        <span class="stat-value" id="dashCount">—</span>
        <span class="stat-label">Expenses (in sample)</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="dashTotal">—</span>
        <span class="stat-label">Total amount (price × qty)</span>
      </div>
    </div>
    <div class="dashboard-charts">
      <div class="chart-card">
        <h2>Amount by month</h2>
        <div class="chart-canvas-wrap">
          <canvas id="chartMonth" aria-label="Amount by month"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2>Top items by amount</h2>
        <div class="chart-canvas-wrap">
          <canvas id="chartItems" aria-label="Top items by amount"></canvas>
        </div>
      </div>
    </div>
    <p id="dashboardMsg" class="dashboard-status" role="status" aria-live="polite"></p>
    <p id="dashModeHint" class="hint md-body-text" style="max-width: 42rem"></p>

    </main>

    <script src="js/expense-app-local.js"></script>
    <script src="js/sf-config.js"></script>
    <script src="js/expense-app-salesforce-oauth.js"></script>
    <script src="js/expense-app-salesforce-rest.js"></script>
    <script src="js/expense-app-mode.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script>
      (function () {
        let chartMonth = null;
        let chartItems = null;

        function destroyDashboardCharts() {
          if (chartMonth) {
            chartMonth.destroy();
            chartMonth = null;
          }
          if (chartItems) {
            chartItems.destroy();
            chartItems = null;
          }
        }

        function dashboardChartTheme() {
          const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          return {
            text: dark ? "#e6e0e9" : "#49454f",
            grid: dark ? "rgba(230, 224, 233, 0.12)" : "rgba(73, 69, 79, 0.15)",
            fillLine: dark ? "rgba(208, 188, 255, 0.35)" : "rgba(103, 80, 164, 0.2)",
            strokeLine: dark ? "#d0bcff" : "#6750a4",
            bar: dark ? "rgba(204, 194, 220, 0.8)" : "rgba(98, 91, 113, 0.65)",
          };
        }

        function fmtMoney(n) {
          const x = Number(n);
          if (!Number.isFinite(x)) return "—";
          return x.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function loadDashboard() {
          const dashboardMsg = document.getElementById("dashboardMsg");
          const dashboardMeta = document.getElementById("dashboardMeta");
          const dashCount = document.getElementById("dashCount");
          const dashTotal = document.getElementById("dashTotal");
          const btn = document.getElementById("btnRefreshDashboard");
          dashboardMsg.textContent = "";
          btn.disabled = true;

          if (typeof Chart === "undefined") {
            dashboardMsg.textContent = "Chart library failed to load.";
            btn.disabled = false;
            return;
          }

          try {
            const data = await window.ExpenseApp.dashboard(2000);
            const meta = data.meta || {};
            dashboardMeta.textContent =
              "Based on up to " +
              (meta.queryLimit != null ? meta.queryLimit : "—") +
              " most recently created expenses (" +
              (meta.recordCount != null ? meta.recordCount : "—") +
              " returned). Month uses expense date when set, otherwise created date.";

            const t = data.totals || {};
            dashCount.textContent = String(t.expenseCount != null ? t.expenseCount : 0);
            dashTotal.textContent = fmtMoney(t.amountSum != null ? t.amountSum : 0);

            const byMonth = Array.isArray(data.byMonth) ? data.byMonth : [];
            const byItem = Array.isArray(data.byItem) ? data.byItem : [];
            const th = dashboardChartTheme();

            destroyDashboardCharts();

            const elM = document.getElementById("chartMonth");
            const elI = document.getElementById("chartItems");
            if (!elM || !elI) return;

            const monthLabels = byMonth.length ? byMonth.map((x) => x.label) : ["No data"];
            const monthData = byMonth.length ? byMonth.map((x) => x.total) : [0];

            chartMonth = new Chart(elM, {
              type: "line",
              data: {
                labels: monthLabels,
                datasets: [
                  {
                    label: "Amount",
                    data: monthData,
                    fill: true,
                    tension: 0.25,
                    backgroundColor: th.fillLine,
                    borderColor: th.strokeLine,
                    borderWidth: 2,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                  x: {
                    ticks: {
                      color: th.text,
                      maxRotation: 45,
                      minRotation: 0,
                      font: { size: 13 },
                    },
                    grid: { color: th.grid },
                  },
                  y: {
                    ticks: { color: th.text, font: { size: 13 } },
                    grid: { color: th.grid },
                  },
                },
              },
            });

            const itemLabels = byItem.length ? byItem.map((x) => x.name) : ["No data"];
            const itemData = byItem.length ? byItem.map((x) => x.total) : [0];

            chartItems = new Chart(elI, {
              type: "bar",
              data: {
                labels: itemLabels,
                datasets: [
                  {
                    label: "Amount",
                    data: itemData,
                    backgroundColor: th.bar,
                  },
                ],
              },
              options: {
                indexAxis: "y",
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                  x: {
                    ticks: { color: th.text, font: { size: 13 } },
                    grid: { color: th.grid },
                  },
                  y: {
                    ticks: { color: th.text, autoSkip: false, font: { size: 13 } },
                    grid: { display: false },
                  },
                },
              },
            });
          } catch (err) {
            dashboardMsg.textContent = String(err.message || err);
            destroyDashboardCharts();
          } finally {
            btn.disabled = false;
          }
        }

        document.getElementById("btnRefreshDashboard").addEventListener("click", () => {
          loadDashboard();
        });

        function refreshDashHint() {
          var el = document.getElementById("dashModeHint");
          if (!el || !window.ExpenseApp) return;
          el.textContent = window.ExpenseApp.usesSalesforceBackend()
            ? "Charts use Expense_Item_Price__c rows from Salesforce (standard REST), same session as the main form."
            : "Charts use expenses in this browser (localStorage), same as the main form.";
        }

        window.addEventListener("DOMContentLoaded", async () => {
          if (window.SFExpenseSession) {
            try {
              await SFExpenseSession.handleRedirectIfPresent();
            } catch (e) {}
          }
          refreshDashHint();
          loadDashboard();
        });
      })();
    </script>
  </body>
</html>
