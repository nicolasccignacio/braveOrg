<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create expense</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.45;
      }
      .site-nav {
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .site-nav a {
        color: inherit;
        margin-right: 1rem;
      }
      .site-nav a[aria-current="page"] {
        font-weight: 650;
        text-decoration: none;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 650;
      }
      h2 {
        font-size: 1.05rem;
        font-weight: 650;
        margin-top: 1.75rem;
        margin-bottom: 0.5rem;
      }
      label {
        display: block;
        margin-top: 0.85rem;
        font-weight: 600;
        font-size: 0.9rem;
      }
      input[type="text"],
      input[type="number"],
      input[type="date"],
      select {
        width: 100%;
        box-sizing: border-box;
        margin-top: 0.2rem;
        padding: 0.45rem 0.5rem;
        font: inherit;
      }
      .item-field-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin-top: 0.85rem;
      }
      .item-field-header label {
        margin-top: 0;
      }
      .btn-icon-add {
        flex-shrink: 0;
        width: 2.1rem;
        height: 2.1rem;
        padding: 0;
        font-size: 1.4rem;
        line-height: 1;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid rgba(127, 127, 127, 0.45);
        background: canvas;
        color: canvastext;
        cursor: pointer;
      }
      .btn-icon-add:hover,
      .btn-icon-add:focus {
        background: rgba(127, 127, 127, 0.12);
        outline: none;
      }
      .btn-icon-add:focus-visible {
        outline: 2px solid Highlight;
        outline-offset: 2px;
      }
      .quick-item-panel {
        margin-top: 0.5rem;
        margin-bottom: 0.25rem;
      }
      .quick-item-panel[hidden] {
        display: none !important;
      }
      .quick-item-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .quick-item-row input[type="text"] {
        flex: 1;
        min-width: 10rem;
        margin-top: 0;
      }
      .quick-item-row button {
        padding: 0.45rem 0.85rem;
        font: inherit;
        cursor: pointer;
        white-space: nowrap;
      }
      .quick-item-msg {
        font-size: 0.8rem;
        margin-top: 0.35rem;
        min-height: 1em;
      }
      .quick-item-msg.ok {
        color: seagreen;
      }
      .quick-item-msg.err {
        color: crimson;
      }
      .item-status {
        font-size: 0.8rem;
        margin-top: 0.35rem;
        min-height: 1em;
      }
      .item-status.error {
        color: crimson;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .item-combobox {
        position: relative;
        margin-top: 0.2rem;
      }
      .item-combobox input[type="text"] {
        margin-top: 0;
      }
      .item-listbox {
        list-style: none;
        margin: 0;
        padding: 0;
        position: absolute;
        left: 0;
        right: 0;
        max-height: 14rem;
        overflow-y: auto;
        z-index: 20;
        background: canvas;
        color: canvastext;
        border: 1px solid rgba(127, 127, 127, 0.45);
        border-radius: 4px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      }
      .item-listbox[hidden] {
        display: none !important;
      }
      .item-listbox li[role="option"] {
        margin: 0;
        padding: 0.4rem 0.55rem;
        cursor: pointer;
      }
      .item-listbox li[role="option"][aria-selected="true"],
      .item-listbox li[role="option"]:hover {
        background: rgba(127, 127, 127, 0.15);
      }
      .item-listbox .item-list-hint {
        cursor: default;
        padding: 0.4rem 0.55rem;
        font-size: 0.85rem;
        opacity: 0.85;
      }
      button[type="submit"] {
        margin-top: 1.25rem;
        padding: 0.55rem 1.1rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .msg {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      .msg.ok {
        background: rgba(46, 125, 50, 0.12);
      }
      .msg.err {
        background: rgba(198, 40, 40, 0.12);
      }
      .hp {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      .history-wrap {
        overflow-x: auto;
        margin-top: 0.5rem;
        border: 1px solid rgba(127, 127, 127, 0.35);
        border-radius: 6px;
      }
      table.history {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      .history th,
      .history td {
        padding: 0.4rem 0.5rem;
        text-align: left;
        border-bottom: 1px solid rgba(127, 127, 127, 0.25);
      }
      .history th {
        font-weight: 600;
        background: rgba(127, 127, 127, 0.08);
      }
      .history-status {
        font-size: 0.8rem;
        margin-top: 0.35rem;
        color: crimson;
      }
      .history-actions {
        white-space: nowrap;
        text-align: right;
      }
      .history-actions .btn-icon-table {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2rem;
        height: 2rem;
        margin: 0 0.1rem;
        padding: 0;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        vertical-align: middle;
      }
      .history-actions .btn-icon-table:hover {
        background: rgba(127, 127, 127, 0.15);
      }
      .history-actions .btn-icon-table:focus-visible {
        outline: 2px solid Highlight;
        outline-offset: 1px;
      }
      .history-actions .btn-icon-table.danger:hover {
        background: rgba(198, 40, 40, 0.15);
        color: crimson;
      }
      .edit-dialog {
        border: 1px solid rgba(127, 127, 127, 0.45);
        border-radius: 10px;
        padding: 1rem 1.1rem;
        max-width: min(100vw - 2rem, 22rem);
      }
      .edit-dialog::backdrop {
        background: rgba(0, 0, 0, 0.45);
      }
      .edit-dialog h3 {
        margin: 0 0 0.35rem;
        font-size: 1.1rem;
      }
      .edit-meta {
        font-size: 0.8rem;
        opacity: 0.85;
        margin: 0 0 0.75rem;
        word-break: break-all;
      }
      .edit-dialog label {
        margin-top: 0.65rem;
      }
      .edit-dialog-actions {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        margin-top: 1rem;
      }
      .edit-dialog-actions button {
        padding: 0.45rem 0.9rem;
        font: inherit;
        cursor: pointer;
      }
      #editExpenseErr {
        margin-top: 0.5rem;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <nav class="site-nav" aria-label="Site">
      <a href="index.html" aria-current="page">Create expense</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>

    <h1>Create expense</h1>

    <h2>Expense</h2>
    <form id="f" novalidate>
      <input type="text" name="website" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true" />

      <div class="item-field-header">
        <label for="itemSearch">Item</label>
        <button
          type="button"
          id="btnToggleQuickItem"
          class="btn-icon-add"
          aria-expanded="false"
          aria-controls="quickItemPanel"
          title="Create new item"
        >
          +
        </button>
      </div>
      <div id="quickItemPanel" class="quick-item-panel" hidden>
        <div class="quick-item-row">
          <input
            id="quickItemName"
            type="text"
            placeholder="New item name"
            autocomplete="off"
            aria-label="New item name"
          />
          <button type="button" id="btnQuickCreateItem">Add</button>
        </div>
        <p id="quickItemMsg" class="quick-item-msg" role="status" aria-live="polite"></p>
      </div>
      <div class="item-combobox" id="itemCombobox">
        <input
          type="text"
          id="itemSearch"
          autocomplete="off"
          role="combobox"
          aria-expanded="false"
          aria-controls="itemListbox"
          aria-autocomplete="list"
          aria-describedby="itemStatus"
          placeholder="Loading items…"
          disabled
        />
        <ul class="item-listbox" id="itemListbox" role="listbox" aria-label="Items" hidden></ul>
      </div>
      <div id="itemStatus" class="item-status" role="status" aria-live="polite"></div>

      <input type="hidden" name="itemId" id="itemId" />

      <label for="price">Price</label>
      <input id="price" name="price" type="number" step="0.01" inputmode="decimal" />

      <label for="quantity">Quantity</label>
      <input id="quantity" name="quantity" type="number" step="0.01" inputmode="decimal" value="1" />

      <label for="expenseDate">Expense date</label>
      <input id="expenseDate" name="expenseDate" type="date" />

      <label for="cuotas">Cuotas</label>
      <input id="cuotas" name="cuotas" type="number" step="1" inputmode="numeric" />

      <label for="referencia">Referencia</label>
      <input id="referencia" name="referencia" type="text" />

      <button type="submit">Create in Salesforce</button>
    </form>
    <div id="out" role="status"></div>

    <h2>History</h2>
    <div class="history-wrap">
      <table class="history" aria-label="Expense history">
        <thead>
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Expense date</th>
            <th>Created</th>
            <th class="history-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr>
            <td colspan="6">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p id="historyMsg" class="history-status" role="status" aria-live="polite"></p>

    <dialog id="editExpenseDialog" class="edit-dialog" aria-labelledby="editExpenseTitle">
      <h3 id="editExpenseTitle">Edit expense</h3>
      <p id="editExpenseMeta" class="edit-meta"></p>
      <label for="editItemSelect">Item</label>
      <select id="editItemSelect"></select>
      <label for="editPrice">Price</label>
      <input id="editPrice" type="number" step="0.01" inputmode="decimal" />
      <label for="editQuantity">Quantity</label>
      <input id="editQuantity" type="number" step="0.01" inputmode="decimal" />
      <label for="editExpenseDate">Expense date</label>
      <input id="editExpenseDate" type="date" />
      <label for="editCuotas">Cuotas</label>
      <input id="editCuotas" type="number" step="1" inputmode="numeric" />
      <label for="editReferencia">Referencia</label>
      <input id="editReferencia" type="text" />
      <div class="edit-dialog-actions">
        <button type="button" id="editExpenseCancel">Cancel</button>
        <button type="button" id="editExpenseSave">Save</button>
      </div>
      <p id="editExpenseErr" class="history-status" role="status"></p>
    </dialog>

    <script>
      (function () {
        const form = document.getElementById("f");
        const itemSearch = document.getElementById("itemSearch");
        const itemListbox = document.getElementById("itemListbox");
        const itemIdInput = document.getElementById("itemId");
        const itemStatus = document.getElementById("itemStatus");
        const out = document.getElementById("out");
        const historyBody = document.getElementById("historyBody");
        const historyMsg = document.getElementById("historyMsg");
        const quickItemPanel = document.getElementById("quickItemPanel");
        const btnToggleQuickItem = document.getElementById("btnToggleQuickItem");
        const quickItemName = document.getElementById("quickItemName");
        const btnQuickCreateItem = document.getElementById("btnQuickCreateItem");
        const quickItemMsg = document.getElementById("quickItemMsg");

        function todayLocal() {
          const d = new Date();
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, "0");
          const day = String(d.getDate()).padStart(2, "0");
          return y + "-" + m + "-" + day;
        }

        function setFormDefaults() {
          document.getElementById("quantity").value = "1";
          document.getElementById("expenseDate").value = todayLocal();
        }

        function setItemStatusError(text) {
          itemStatus.className = "item-status error";
          itemStatus.textContent = text || "";
        }

        function clearItemStatus() {
          itemStatus.className = "item-status";
          itemStatus.textContent = "";
        }

        function setItemId(id) {
          itemIdInput.value = id || "";
        }

        /** Cached items from initial load; server search merges in for names past the preload cap. */
        let itemsCache = [];
        let pickerSelectedId = null;
        let pickerSelectedLabel = "";
        let listEntries = [];
        let activeListIndex = -1;
        let remoteSearchTimer = null;
        let remoteSearchSeq = 0;
        let blurCloseTimer = null;

        const MAX_DROPDOWN_LOCAL = 100;
        const INITIAL_EMPTY_SHOW = 80;
        const MIN_REMOTE_CHARS = 2;

        function rowToItem(row) {
          const nm = row.name != null ? String(row.name).trim() : "";
          return { id: row.id, label: nm || "Unnamed item" };
        }

        function mergeItemsIntoCache(newItems) {
          const byId = new Map(itemsCache.map((i) => [i.id, i]));
          newItems.forEach((i) => byId.set(i.id, i));
          itemsCache = Array.from(byId.values());
        }

        function sortedCache() {
          return [...itemsCache].sort((a, b) =>
            a.label.localeCompare(b.label, undefined, { sensitivity: "base" })
          );
        }

        function localMatches(query) {
          const sorted = sortedCache();
          const t = String(query || "").trim().toLowerCase();
          if (!t) return sorted.slice(0, INITIAL_EMPTY_SHOW);
          return sorted
            .filter((it) => it.label.toLowerCase().includes(t))
            .slice(0, MAX_DROPDOWN_LOCAL);
        }

        function closeListbox() {
          itemListbox.hidden = true;
          itemSearch.setAttribute("aria-expanded", "false");
          activeListIndex = -1;
          itemSearch.removeAttribute("aria-activedescendant");
        }

        function openListbox() {
          itemListbox.hidden = false;
          itemSearch.setAttribute("aria-expanded", "true");
        }

        function setListActive(idx) {
          const opts = itemListbox.querySelectorAll('li[role="option"]');
          if (!opts.length) return;
          activeListIndex = Math.max(0, Math.min(idx, opts.length - 1));
          opts.forEach((el, i) => {
            el.setAttribute("aria-selected", i === activeListIndex ? "true" : "false");
          });
          const cur = opts[activeListIndex];
          itemSearch.setAttribute("aria-activedescendant", cur.id);
          cur.scrollIntoView({ block: "nearest" });
        }

        function renderListbox(entries, hintWhenEmpty) {
          listEntries = entries.slice();
          activeListIndex = -1;
          itemSearch.removeAttribute("aria-activedescendant");
          itemListbox.innerHTML = "";
          entries.forEach((it, i) => {
            const li = document.createElement("li");
            li.id = "item-opt-" + i;
            li.setAttribute("role", "option");
            li.dataset.id = it.id;
            li.dataset.label = it.label;
            li.textContent = it.label;
            li.addEventListener("click", () => pickItem(it.id, it.label));
            itemListbox.appendChild(li);
          });
          if (entries.length === 0) {
            const li = document.createElement("li");
            li.className = "item-list-hint";
            li.setAttribute("role", "presentation");
            li.textContent = hintWhenEmpty || "No matching items.";
            itemListbox.appendChild(li);
          }
        }

        function pickItem(id, label) {
          setItemId(id);
          itemSearch.value = label;
          pickerSelectedId = id;
          pickerSelectedLabel = label;
          closeListbox();
          clearItemStatus();
        }

        function clearItemPicker() {
          pickerSelectedId = null;
          pickerSelectedLabel = "";
          setItemId("");
          itemSearch.value = "";
          closeListbox();
        }

        function updateItemListbox() {
          clearTimeout(remoteSearchTimer);
          const q = itemSearch.value;

          const local = localMatches(q);
          if (local.length > 0) {
            renderListbox(local);
            openListbox();
            return;
          }

          if (!String(q).trim()) {
            renderListbox(
              localMatches(""),
              itemsCache.length ? "" : "No items loaded."
            );
            openListbox();
            return;
          }

          if (String(q).trim().length < MIN_REMOTE_CHARS) {
            renderListbox(
              [],
              "Type at least " +
                MIN_REMOTE_CHARS +
                " characters to search the full catalog (first " +
                INITIAL_EMPTY_SHOW +
                " items show when the field is empty)."
            );
            openListbox();
            return;
          }

          renderListbox([], "Searching…");
          openListbox();
          remoteSearchTimer = setTimeout(() => remoteItemSearch(String(q).trim()), 260);
        }

        async function remoteItemSearch(q) {
          const seq = ++remoteSearchSeq;
          try {
            const url =
              "/.netlify/functions/search-items?q=" + encodeURIComponent(q) + "&limit=150";
            const r = await fetch(url);
            const data = await r.json().catch(() => ({}));
            if (seq !== remoteSearchSeq) return;
            if (!r.ok) {
              renderListbox([], data.error || "Search failed.");
              openListbox();
              return;
            }
            const found = (Array.isArray(data.records) ? data.records : []).map(rowToItem);
            mergeItemsIntoCache(found);
            renderListbox(found, found.length ? "" : "No matching items.");
            openListbox();
          } catch (e) {
            if (seq !== remoteSearchSeq) return;
            renderListbox([], String(e.message || e));
            openListbox();
          }
        }

        itemListbox.addEventListener("mousedown", (e) => {
          if (e.target.closest('li[role="option"]')) e.preventDefault();
        });

        itemSearch.addEventListener("input", () => {
          if (pickerSelectedId && itemSearch.value !== pickerSelectedLabel) {
            pickerSelectedId = null;
            pickerSelectedLabel = "";
            setItemId("");
          }
          updateItemListbox();
        });

        itemSearch.addEventListener("focus", () => {
          clearTimeout(blurCloseTimer);
          if (!itemSearch.disabled) updateItemListbox();
        });

        itemSearch.addEventListener("blur", () => {
          blurCloseTimer = setTimeout(() => closeListbox(), 200);
        });

        itemSearch.addEventListener("keydown", (ev) => {
          const optCount = itemListbox.querySelectorAll('li[role="option"]').length;
          if (!itemListbox.hidden && ev.key === "Escape") {
            closeListbox();
            ev.preventDefault();
            return;
          }
          if ((ev.key === "ArrowDown" || ev.key === "ArrowUp") && !itemSearch.disabled) {
            if (itemListbox.hidden) {
              updateItemListbox();
              ev.preventDefault();
              queueMicrotask(() => {
                const n = itemListbox.querySelectorAll('li[role="option"]').length;
                if (!n) return;
                if (ev.key === "ArrowDown") setListActive(0);
                else setListActive(n - 1);
              });
              return;
            }
            ev.preventDefault();
            if (ev.key === "ArrowDown") {
              setListActive(activeListIndex < 0 ? 0 : activeListIndex + 1);
            } else {
              const n = optCount;
              setListActive(activeListIndex <= 0 ? n - 1 : activeListIndex - 1);
            }
            return;
          }
          if (ev.key === "Enter" && !itemListbox.hidden) {
            const opts = itemListbox.querySelectorAll('li[role="option"]');
            if (activeListIndex >= 0 && opts[activeListIndex]) {
              const li = opts[activeListIndex];
              pickItem(li.dataset.id, li.dataset.label);
              ev.preventDefault();
            }
          }
        });

        async function loadAllItems(selectIdAfter) {
          clearItemStatus();
          itemsCache = [];
          itemSearch.disabled = true;
          itemSearch.placeholder = "Loading items…";
          closeListbox();

          const url = "/.netlify/functions/search-items?q=&limit=2000";
          const r = await fetch(url);
          const text = await r.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            throw new Error("Bad response (not JSON). " + text.slice(0, 160));
          }
          if (!r.ok) {
            console.error("search-items", r.status, data);
            const parts = [data.error || "Load failed (" + r.status + ")"];
            if (data.hint) parts.push(data.hint);
            if (data.details != null) parts.push(JSON.stringify(data.details).slice(0, 600));
            throw new Error(parts.join("\n"));
          }

          const records = Array.isArray(data.records) ? data.records : [];
          itemsCache = records.map(rowToItem);

          itemSearch.disabled = false;
          itemSearch.placeholder = "Type to search items…";

          if (selectIdAfter && itemsCache.some((row) => row.id === selectIdAfter)) {
            const row = itemsCache.find((x) => x.id === selectIdAfter);
            pickItem(selectIdAfter, row.label);
          } else {
            clearItemPicker();
          }
        }

        const editExpenseDialog = document.getElementById("editExpenseDialog");
        const editExpenseMeta = document.getElementById("editExpenseMeta");
        const editItemSelect = document.getElementById("editItemSelect");
        const editPrice = document.getElementById("editPrice");
        const editQuantity = document.getElementById("editQuantity");
        const editExpenseDate = document.getElementById("editExpenseDate");
        const editCuotas = document.getElementById("editCuotas");
        const editReferencia = document.getElementById("editReferencia");
        const editExpenseCancel = document.getElementById("editExpenseCancel");
        const editExpenseSave = document.getElementById("editExpenseSave");
        const editExpenseErr = document.getElementById("editExpenseErr");

        let editingRecordId = null;

        const ICON_EDIT =
          '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
        const ICON_DELETE =
          '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';

        function formatDate(s) {
          if (s == null || s === "") return "—";
          const str = String(s);
          if (str.length >= 10) return str.slice(0, 10);
          try {
            return new Date(str).toLocaleString(undefined, { dateStyle: "short", timeStyle: "short" });
          } catch {
            return str;
          }
        }

        function toDateInputValue(s) {
          if (s == null || s === "") return "";
          const str = String(s);
          if (str.length >= 10 && str[4] === "-") return str.slice(0, 10);
          const d = new Date(str);
          if (isNaN(d.getTime())) return "";
          return d.toISOString().slice(0, 10);
        }

        function fillEditItemSelect(selectedId, itemLabelFallback) {
          editItemSelect.innerHTML = "";
          const ph = document.createElement("option");
          ph.value = "";
          ph.textContent = "Choose…";
          editItemSelect.appendChild(ph);
          const seen = new Set();
          sortedCache().forEach(({ id, label }) => {
            const o = document.createElement("option");
            o.value = id;
            o.textContent = label;
            editItemSelect.appendChild(o);
            seen.add(id);
          });
          if (selectedId && !seen.has(selectedId)) {
            const o = document.createElement("option");
            o.value = selectedId;
            const lbl = itemLabelFallback != null ? String(itemLabelFallback).trim() : "";
            o.textContent = lbl || "Previous item";
            editItemSelect.appendChild(o);
          }
          editItemSelect.value = selectedId || "";
        }

        function openEditDialog(row) {
          editingRecordId = row.id;
          editExpenseErr.textContent = "";
          editExpenseMeta.textContent = row.name ? "Record: " + row.name : "Edit expense";
          fillEditItemSelect(row.itemId || "", row.itemName || "");
          editPrice.value = row.price != null && row.price !== "" ? String(row.price) : "";
          editQuantity.value = row.quantity != null && row.quantity !== "" ? String(row.quantity) : "1";
          editExpenseDate.value = toDateInputValue(row.expenseDate) || todayLocal();
          editCuotas.value = row.cuotas != null && row.cuotas !== "" ? String(row.cuotas) : "";
          editReferencia.value = row.referencia != null ? String(row.referencia) : "";
          editExpenseDialog.showModal();
          editItemSelect.focus();
        }

        async function deleteExpenseRow(row) {
          if (!confirm("Delete this expense? This cannot be undone.")) return;
          historyMsg.textContent = "";
          try {
            const r = await fetch("/.netlify/functions/delete-expense", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ recordId: row.id, website: "" }),
            });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) {
              historyMsg.textContent = data.error || JSON.stringify(data);
              return;
            }
            await loadHistory();
          } catch (err) {
            historyMsg.textContent = String(err);
          }
        }

        async function loadHistory() {
          historyMsg.textContent = "";
          historyBody.innerHTML = "<tr><td colspan='6'>Loading…</td></tr>";
          try {
            const r = await fetch("/.netlify/functions/list-history?limit=50");
            const text = await r.text();
            let data;
            try {
              data = JSON.parse(text);
            } catch {
              throw new Error(text.slice(0, 200));
            }
            if (!r.ok) {
              const parts = [data.error || "History failed"];
              if (data.details) parts.push(JSON.stringify(data.details).slice(0, 400));
              throw new Error(parts.join(" "));
            }
            const records = Array.isArray(data.records) ? data.records : [];
            if (!records.length) {
              historyBody.innerHTML = "<tr><td colspan='6'>No rows yet.</td></tr>";
              return;
            }
            historyBody.innerHTML = "";
            records.forEach((row) => {
              const tr = document.createElement("tr");
              const itemLabel = row.itemName || "—";
              const tdItem = document.createElement("td");
              tdItem.textContent = itemLabel;
              const tdPrice = document.createElement("td");
              tdPrice.textContent = row.price != null ? String(row.price) : "—";
              const tdQty = document.createElement("td");
              tdQty.textContent = row.quantity != null ? String(row.quantity) : "—";
              const tdExp = document.createElement("td");
              tdExp.textContent = formatDate(row.expenseDate);
              const tdCreated = document.createElement("td");
              tdCreated.textContent = formatDate(row.createdDate);
              const tdAct = document.createElement("td");
              tdAct.className = "history-actions";

              const btnEdit = document.createElement("button");
              btnEdit.type = "button";
              btnEdit.className = "btn-icon-table";
              btnEdit.setAttribute("aria-label", "Edit expense");
              btnEdit.title = "Edit";
              btnEdit.innerHTML = ICON_EDIT;
              btnEdit.addEventListener("click", () => openEditDialog(row));

              const btnDel = document.createElement("button");
              btnDel.type = "button";
              btnDel.className = "btn-icon-table danger";
              btnDel.setAttribute("aria-label", "Delete expense");
              btnDel.title = "Delete";
              btnDel.innerHTML = ICON_DELETE;
              btnDel.addEventListener("click", () => deleteExpenseRow(row));

              tdAct.appendChild(btnEdit);
              tdAct.appendChild(btnDel);
              tr.appendChild(tdItem);
              tr.appendChild(tdPrice);
              tr.appendChild(tdQty);
              tr.appendChild(tdExp);
              tr.appendChild(tdCreated);
              tr.appendChild(tdAct);
              historyBody.appendChild(tr);
            });
          } catch (e) {
            historyBody.innerHTML = "<tr><td colspan='6'>Could not load history.</td></tr>";
            historyMsg.textContent = String(e.message || e);
          }
        }

        editExpenseDialog.addEventListener("close", () => {
          editingRecordId = null;
          editExpenseErr.textContent = "";
        });

        editExpenseCancel.addEventListener("click", () => {
          editExpenseDialog.close();
        });

        editExpenseSave.addEventListener("click", async () => {
          editExpenseErr.textContent = "";
          const itemId = editItemSelect.value.trim();
          if (!itemId) {
            editExpenseErr.textContent = "Choose an item.";
            return;
          }
          editExpenseSave.disabled = true;
          try {
            const payload = {
              website: "",
              recordId: editingRecordId,
              itemId: itemId,
              price: editPrice.value,
              quantity: editQuantity.value,
              expenseDate: editExpenseDate.value || null,
              cuotas: editCuotas.value,
              referencia: editReferencia.value.trim() || null,
            };
            const r = await fetch("/.netlify/functions/update-expense", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) {
              editExpenseErr.textContent = data.error || JSON.stringify(data);
              return;
            }
            editExpenseDialog.close();
            editingRecordId = null;
            await loadHistory();
          } catch (err) {
            editExpenseErr.textContent = String(err);
          } finally {
            editExpenseSave.disabled = false;
          }
        });

        function setQuickItemMsg(kind, text) {
          quickItemMsg.className = "quick-item-msg" + (kind ? " " + kind : "");
          quickItemMsg.textContent = text || "";
        }

        btnToggleQuickItem.addEventListener("click", () => {
          const willOpen = quickItemPanel.hidden;
          quickItemPanel.hidden = !willOpen;
          btnToggleQuickItem.setAttribute("aria-expanded", willOpen ? "true" : "false");
          setQuickItemMsg("", "");
          if (willOpen) {
            quickItemName.focus();
          }
        });

        quickItemName.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") {
            ev.preventDefault();
            btnQuickCreateItem.click();
          }
        });

        btnQuickCreateItem.addEventListener("click", async () => {
          setQuickItemMsg("", "");
          const name = quickItemName.value.trim();
          if (!name) {
            setQuickItemMsg("err", "Enter a name.");
            return;
          }
          btnQuickCreateItem.disabled = true;
          try {
            const r = await fetch("/.netlify/functions/create-item", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name: name }),
            });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) {
              setQuickItemMsg("err", data.error || JSON.stringify(data));
              return;
            }
            quickItemName.value = "";
            setQuickItemMsg("ok", "Created.");
            quickItemPanel.hidden = true;
            btnToggleQuickItem.setAttribute("aria-expanded", "false");
            await loadAllItems(data.id);
            loadHistory();
          } catch (err) {
            setQuickItemMsg("err", String(err));
          } finally {
            btnQuickCreateItem.disabled = false;
          }
        });

        window.addEventListener("DOMContentLoaded", () => {
          setFormDefaults();
          loadAllItems()
            .catch((e) => {
              itemsCache = [];
              itemSearch.disabled = true;
              itemSearch.placeholder = "Could not load items";
              setItemStatusError(String(e.message || e));
            });
          loadHistory();
        });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          out.innerHTML = "";
          out.className = "msg";

          const fd = new FormData(form);
          const payload = {
            website: fd.get("website") || "",
            itemId: (fd.get("itemId") || "").trim(),
            price: fd.get("price"),
            quantity: fd.get("quantity"),
            expenseDate: fd.get("expenseDate") || null,
            cuotas: fd.get("cuotas"),
            referencia: (fd.get("referencia") || "").trim() || null,
          };

          if (!payload.itemId) {
            out.classList.add("err");
            out.textContent = "Choose an item in the list.";
            return;
          }

          try {
            const r = await fetch("/.netlify/functions/submit-expense", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const data = await r.json().catch(() => ({}));
            if (r.ok) {
              out.classList.add("ok");
              out.textContent = "Expense saved.";
              form.reset();
              setFormDefaults();
              clearItemPicker();
              clearItemStatus();
              loadAllItems().catch(() => {});
              loadHistory();
            } else {
              out.classList.add("err");
              out.textContent = data.error || JSON.stringify(data);
            }
          } catch (err) {
            out.classList.add("err");
            out.textContent = String(err);
          }
        });
      })();
    </script>
  </body>
</html>
