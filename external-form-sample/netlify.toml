[build]
  publish = "public"
  functions = "netlify/functions"

# Native canvas + pdf.js must stay in node_modules (not esbuild-bundled). pdf.worker.mjs is loaded via dynamic import — include it or the fake worker fails on Lambda.
[functions]
  external_node_modules = ["@napi-rs/canvas", "pdf-parse", "pdfjs-dist"]
  included_files = ["node_modules/pdfjs-dist/legacy/build/pdf.worker.mjs"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
