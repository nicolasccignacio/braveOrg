# Builds the React app (Vite) in external-form-sample/web and publishes dist/ to GitHub Pages.
#
# One-time: Repo → Settings → Pages → Source: "GitHub Actions" → Save.
# Optional Salesforce (no end-user typing), read at deploy time only:
#   Secrets → Repository secrets:
#     SF_CLIENT_ID     — Connected App Consumer Key (PKCE public client; value is not sensitive but often stored as secret)
#   Variables → Repository variables:
#     SF_INSTANCE_URL  — primary: your org host for OAuth + config (e.g. https://MyDomain.my.salesforce.com), no trailing slash
#     SF_LOGIN_URL     — fallback if SF_INSTANCE_URL unset (e.g. https://login.salesforce.com)
#     SF_LOGIN_HOST    — second fallback (same intent as SF_LOGIN_URL)
#     SF_API_VERSION        — optional, default v63.0
#     SF_OAUTH_REDIRECT_URI — optional; exact OAuth callback URL (must match Connected App). If unset, the app normalizes /repo/ → /repo/index.html.
#   Fallbacks: SF_CLIENT_ID may instead be a variable.
# Do NOT put SF_CLIENT_SECRET into the static site — PKCE browser apps must not ship a client secret.
# REST calls still use instance_url from the token response; SF_INSTANCE_URL here sets loginHost for /services/oauth2/* only.
# Connected App callback URLs must match each page used to start login; enable CORS for the Pages origin.
#
# Optional Supabase (cloud Postgres + Auth; run supabase/migrations/*.sql in the Supabase SQL editor or CLI):
#   Variables (or secrets): SUPABASE_URL — project URL, e.g. https://xxxxx.supabase.co
#   Variables or secrets: SUPABASE_ANON_KEY — Project Settings → API → anon public key
#   In Supabase: Authentication → URL Configuration → Site URL = your GitHub Pages origin (and add redirect URLs if needed).
#
# GitHub project Pages base path: set repository variable PAGES_BASE_PATH to /your-repo-name/ (leading and trailing slashes).
# Example: site at https://user.github.io/braveOrg/ → PAGES_BASE_PATH=/braveOrg/
# Omit or use / for a user site (username.github.io root).
# We omit actions/configure-pages (avoids 404 before Pages is enabled).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "external-form-sample/web/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write js/sf-config.js from Actions secrets/variables
        env:
          SF_CLIENT_ID_SECRET: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_ID_VAR: ${{ vars.SF_CLIENT_ID }}
          SF_INSTANCE_URL: ${{ vars.SF_INSTANCE_URL }}
          SF_LOGIN_URL: ${{ vars.SF_LOGIN_URL }}
          SF_LOGIN_HOST: ${{ vars.SF_LOGIN_HOST }}
          SF_API_VERSION: ${{ vars.SF_API_VERSION }}
          SF_OAUTH_REDIRECT_URI: ${{ vars.SF_OAUTH_REDIRECT_URI }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "external-form-sample/web/public/js/sf-config.js";
          const clientId = (process.env.SF_CLIENT_ID_SECRET || process.env.SF_CLIENT_ID_VAR || "").trim();
          const loginHost = (
            process.env.SF_INSTANCE_URL ||
            process.env.SF_LOGIN_URL ||
            process.env.SF_LOGIN_HOST ||
            "https://login.salesforce.com"
          )
            .trim()
            .replace(/\/$/, "");
          const apiVersion = (process.env.SF_API_VERSION || "v63.0").trim() || "v63.0";
          const redirectUri = (process.env.SF_OAUTH_REDIRECT_URI || "").trim();
          const cfg = {
            clientId,
            loginHost: loginHost || "https://login.salesforce.com",
            apiVersion: apiVersion.indexOf("v") === 0 ? apiVersion : "v" + apiVersion,
          };
          if (redirectUri) cfg.redirectUri = redirectUri;
          const body =
            "/** Generated in CI: SF_CLIENT_ID, login host vars, SF_API_VERSION, optional SF_OAUTH_REDIRECT_URI. */\n" +
            "(function(){window.__EXPENSE_SF_CONFIG__=" +
            JSON.stringify(cfg) +
            ";})();\n";
          fs.writeFileSync(path, body, "utf8");
          NODE

      - name: Write js/supabase-config.js from Actions variables/secrets
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY_SECRET: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_ANON_KEY_VAR: ${{ vars.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "external-form-sample/web/public/js/supabase-config.js";
          const url = (process.env.SUPABASE_URL || "").trim().replace(/\/$/, "");
          const anonKey = (process.env.SUPABASE_ANON_KEY_SECRET || process.env.SUPABASE_ANON_KEY_VAR || "").trim();
          const cfg = { url, anonKey };
          const body =
            "/** Generated in CI: SUPABASE_URL, SUPABASE_ANON_KEY. */\n" +
            "(function(){window.__SUPABASE_CONFIG__=" +
            JSON.stringify(cfg) +
            ";})();\n";
          fs.writeFileSync(path, body, "utf8");
          NODE

      - name: Install and build React app
        working-directory: external-form-sample/web
        env:
          VITE_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: external-form-sample/web/dist

      - uses: actions/deploy-pages@v4
        id: deployment
