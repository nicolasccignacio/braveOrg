# Publishes external-form-sample/public to GitHub Pages (fully static app: localStorage + optional browser Gemini).
#
# One-time: Repo → Settings → Pages → Source: "GitHub Actions" → Save.
# We omit actions/configure-pages (unnecessary for static upload; avoids 404 before Pages is enabled).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "external-form-sample/public/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: external-form-sample/public

      - uses: actions/deploy-pages@v4
        id: deployment
