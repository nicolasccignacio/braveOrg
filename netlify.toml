# Deploy the expense form from this monorepo (Salesforce project + external-form-sample).
# Netlify UI can instead set "Base directory" to external-form-sample and omit this file.
# Static mirror: .github/workflows/deploy-github-pages.yml (same public/ folder; Pages build is fully client-side).
#
# Skip the build (saves build minutes) when this push only changes files outside the site folder.
# Runs from repo root; exit 0 = cancel build. See https://docs.netlify.com/configure-builds/ignore-builds/

[build]
  base = "external-form-sample"
  publish = "public"
  functions = "netlify/functions"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- external-form-sample/"

# Same as external-form-sample/netlify.toml — needed when building from repo root + base.
[functions]
  external_node_modules = ["@napi-rs/canvas", "pdf-parse", "pdfjs-dist"]
  included_files = ["node_modules/pdfjs-dist/legacy/build/pdf.worker.mjs"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
